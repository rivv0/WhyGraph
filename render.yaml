services:
  - type: web
    name: why-graph-node
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run web
    envVars:
      - key: GITHUB_TOKEN
        sync: false # You will provide this securely in the Render Dashboard
      - key: GROQ_API_KEY
        sync: false # You will provide this securely in the Render Dashboard
      - key: PORT
        value: 3000
