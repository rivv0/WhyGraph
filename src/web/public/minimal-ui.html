<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Memory - Minimal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Minimal search interface */
        .search-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .search-container.active {
            top: 60px;
            transform: translateX(-50%);
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 20px 24px;
            font-size: 18px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: #000;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .search-hint {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Graph canvas */
        #graph-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #graph-canvas.visible {
            opacity: 1;
        }

        /* Decision nodes */
        .decision-node {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .decision-node:hover {
            width: 16px;
            height: 16px;
            background: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }

        .decision-node.primary {
            width: 20px;
            height: 20px;
            background: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        .decision-node.active {
            background: #fff;
            box-shadow: 0 0 40px rgba(255, 255, 255, 1);
        }

        /* Connection lines */
        .connection-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg,
                    rgba(100, 200, 255, 0.3),
                    rgba(100, 200, 255, 0.1));
            transform-origin: left center;
            pointer-events: none;
        }

        /* Decision detail panel */
        .detail-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: #000;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            overflow-y: auto;
            transition: right 0.3s ease;
            z-index: 200;
        }

        .detail-panel.open {
            right: 0;
        }

        .detail-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: #000;
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: all 0.2s ease;
        }

        .detail-close:hover {
            background: #fff;
            color: #000;
        }

        .detail-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .detail-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 12px;
        }

        .confidence-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: #000;
            color: #fff;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .detail-content {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }

        .timeline-item {
            position: relative;
            padding-left: 30px;
            margin-bottom: 24px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            z-index: 2;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 14px;
            width: 2px;
            height: calc(100% + 10px);
            background: #fff;
            z-index: 1;
        }

        .timeline-item:last-child::after {
            display: none;
        }

        .timeline-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
        }

        .timeline-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Loading state */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .detail-panel {
                width: 100%;
                right: -100%;
            }
        }

        /* Ingest Action Buttons */
        .action-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* Ingest Panel */
        .ingest-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .ingest-panel.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .ingest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .ingest-title {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        .ingest-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
        }

        .ingest-close:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .form-select {
            appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .form-select option {
            background: #111;
        }

        .submit-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            display: none;
        }
    </style>
</head>

<body>
    <!-- Search Interface -->
    <div class="search-container" id="searchContainer">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput"
                placeholder="Search for a component, decision, or feature..." autocomplete="off">
        </div>
        <div class="search-hint">
            Try: "Redis", "authentication", "microservices"
        </div>
    </div>

    <!-- Graph Canvas -->
    <canvas id="graph-canvas"></canvas>

    <!-- Decision Detail Panel -->
    <div class="detail-panel" id="detailPanel">
        <button class="detail-close" id="closeDetail">&times;</button>
        <div id="detailContent"></div>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
        <div>Analyzing decisions...</div>
    </div>

    <!-- Action Buttons -->
    <div class="action-container">
        <button class="action-btn" id="openIngestBtn">+ Ingest Data</button>
    </div>

    <!-- Ingest Panel -->
    <div class="ingest-panel" id="ingestPanel">
        <div class="ingest-header">
            <h2 class="ingest-title">Ingest Repository</h2>
            <button class="ingest-close" id="closeIngestBtn">&times;</button>
        </div>

        <div class="form-group">
            <label class="form-label">Repository</label>
            <input type="text" class="form-input" id="ingestRepoInput" placeholder="owner/repo (e.g. facebook/react)">
        </div>

        <div class="form-group">
            <label class="form-label">Action</label>
            <select class="form-select" id="ingestActionSelect">
                <option value="process-all">Full Pipeline (Ingest, Normalize, Extract)</option>
                <option value="ingest">Ingest Only</option>
                <option value="normalize">Normalize Only</option>
                <option value="extract">Extract Only</option>
            </select>
        </div>

        <button class="submit-btn" id="startIngestBtn">Start Processing</button>
        <div class="status-message" id="ingestStatus"></div>
    </div>

    <script>
        class MinimalDecisionUI {
            constructor() {
                this.canvas = document.getElementById('graph-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.searchInput = document.getElementById('searchInput');
                this.searchContainer = document.getElementById('searchContainer');
                this.detailPanel = document.getElementById('detailPanel');
                this.loading = document.getElementById('loading');

                // Ingest elements
                this.ingestPanel = document.getElementById('ingestPanel');
                this.openIngestBtn = document.getElementById('openIngestBtn');
                this.closeIngestBtn = document.getElementById('closeIngestBtn');
                this.startIngestBtn = document.getElementById('startIngestBtn');
                this.ingestRepoInput = document.getElementById('ingestRepoInput');
                this.ingestActionSelect = document.getElementById('ingestActionSelect');
                this.ingestStatus = document.getElementById('ingestStatus');

                this.nodes = [];
                this.connections = [];
                this.activeNode = null;
                this.animationFrame = null;

                this.init();
            }

            init() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                this.searchInput.addEventListener('input', (e) => this.handleSearch(e));
                this.searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.performSearch();
                });

                document.getElementById('closeDetail').addEventListener('click', () => {
                    this.detailPanel.classList.remove('open');
                    this.activeNode = null;
                });

                // Ingest events
                this.openIngestBtn.addEventListener('click', () => {
                    this.ingestPanel.classList.add('active');
                    this.ingestRepoInput.focus();
                });

                this.closeIngestBtn.addEventListener('click', () => {
                    this.ingestPanel.classList.remove('active');
                });

                this.startIngestBtn.addEventListener('click', () => this.startIngestion());

                this.startAnimation();
            }

            async startIngestion() {
                const repository = this.ingestRepoInput.value.trim();
                const action = this.ingestActionSelect.value;

                if (!repository || !repository.includes('/')) {
                    this.ingestStatus.textContent = 'Please enter a valid owner/repo format';
                    this.ingestStatus.style.color = '#ff6b6b';
                    this.ingestStatus.style.display = 'block';
                    return;
                }

                this.startIngestBtn.disabled = true;
                this.startIngestBtn.textContent = 'Starting...';
                this.ingestStatus.style.display = 'block';
                this.ingestStatus.style.color = 'rgba(255, 255, 255, 0.6)';
                this.ingestStatus.textContent = 'Sending request...';

                try {
                    const response = await fetch(`/api/${action}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ repository })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        this.ingestStatus.textContent = result.message || 'Process started successfully!';
                        this.ingestStatus.style.color = '#51cf66';

                        // Auto close after 3 seconds
                        setTimeout(() => {
                            this.ingestPanel.classList.remove('active');
                            this.startIngestBtn.disabled = false;
                            this.startIngestBtn.textContent = 'Start Processing';
                            this.ingestStatus.style.display = 'none';
                        }, 3000);
                    } else {
                        throw new Error(result.error || 'Failed to start process');
                    }
                } catch (error) {
                    this.ingestStatus.textContent = error.message || 'Network error occurred';
                    this.ingestStatus.style.color = '#ff6b6b';
                    this.startIngestBtn.disabled = false;
                    this.startIngestBtn.textContent = 'Start Processing';
                }
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            async handleSearch(e) {
                const query = e.target.value.trim();
                if (query.length < 2) {
                    this.clearGraph();
                    return;
                }

                // Debounce search
                clearTimeout(this.searchTimeout);
                this.searchTimeout = setTimeout(() => this.performSearch(), 300);
            }

            async performSearch() {
                const query = this.searchInput.value.trim();
                if (!query) return;

                this.loading.style.display = 'block';
                this.searchContainer.classList.add('active');
                this.canvas.classList.add('visible');

                try {
                    const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                    const results = await response.json();

                    this.visualizeDecisions(results);
                } catch (error) {
                    console.error('Search failed:', error);
                } finally {
                    this.loading.style.display = 'none';
                }
            }

            visualizeDecisions(results) {
                this.clearGraph();

                if (results.length === 0) return;

                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                const radius = Math.min(this.canvas.width, this.canvas.height) * 0.3;

                // Create nodes in a circular pattern
                results.forEach((result, index) => {
                    const angle = (index / results.length) * Math.PI * 2;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    this.nodes.push({
                        x, y,
                        targetX: x,
                        targetY: y,
                        data: result,
                        isPrimary: index === 0,
                        radius: index === 0 ? 10 : 6
                    });
                });

                // Create connections between ALL nodes (not just to center)
                for (let i = 0; i < this.nodes.length; i++) {
                    for (let j = i + 1; j < this.nodes.length; j++) {
                        this.connections.push({
                            from: this.nodes[i],
                            to: this.nodes[j]
                        });
                    }
                }

                // Add click handlers
                this.canvas.addEventListener('click', (e) => this.handleNodeClick(e));
            }

            handleNodeClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const clickedNode = this.nodes.find(node => {
                    const dx = x - node.x;
                    const dy = y - node.y;
                    return Math.sqrt(dx * dx + dy * dy) < node.radius + 5;
                });

                if (clickedNode) {
                    this.activeNode = clickedNode;
                    this.showDecisionDetail(clickedNode.data);
                }
            }

            async showDecisionDetail(result) {
                this.detailPanel.classList.add('open');

                try {
                    const response = await fetch(
                        `/api/why/${encodeURIComponent(result.repository)}/${encodeURIComponent(result.component)}`
                    );
                    const explanation = await response.json();

                    this.renderDetail(explanation);
                } catch (error) {
                    console.error('Failed to load detail:', error);
                }
            }

            renderDetail(explanation) {
                document.getElementById('detailContent').innerHTML = `
                    <div class="detail-title">${explanation.component}</div>
                    <div class="detail-meta">
                        <span class="confidence-badge">
                            ${explanation.summary.confidence} confidence
                        </span>
                        <span style="color: rgba(255,255,255,0.5)">
                            ${explanation.evidence.total_events} events
                        </span>
                    </div>

                    <div class="detail-section">
                        <div class="detail-label">Summary</div>
                        <div class="detail-content">${explanation.summary.text}</div>
                    </div>

                    ${explanation.decisions.length > 0 ? `
                        <div class="detail-section">
                            <div class="detail-label">Key Decisions</div>
                            ${explanation.decisions.map(d => `
                                <div class="detail-content" style="margin-bottom: 16px;">
                                    <strong>${d.statement}</strong>
                                    ${d.rationale ? `<br><span style="color: rgba(255,255,255,0.6);">${d.rationale}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    ${explanation.timeline.length > 0 ? `
                        <div class="detail-section">
                            <div class="detail-label">Timeline</div>
                            ${explanation.timeline.slice(0, 5).map(item => `
                                <div class="timeline-item">
                                    <div class="timeline-date">${new Date(item.timestamp).toLocaleDateString()}</div>
                                    <div class="timeline-text">${item.title}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    ${explanation.gaps.length > 0 ? `
                        <div class="detail-section">
                            <div class="detail-label">Information Gaps</div>
                            <div class="detail-content" style="color: rgba(255,255,255,0.7);">
                                ${explanation.gaps.join('<br>')}
                            </div>
                        </div>
                    ` : ''}
                `;
            }

            startAnimation() {
                const animate = () => {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                    // Draw connections
                    this.connections.forEach(conn => {
                        const isActive = this.activeNode &&
                            (conn.from === this.activeNode || conn.to === this.activeNode);

                        this.ctx.beginPath();
                        this.ctx.moveTo(conn.from.x, conn.from.y);
                        this.ctx.lineTo(conn.to.x, conn.to.y);
                        this.ctx.strokeStyle = isActive ?
                            'rgba(255, 255, 255, 0.6)' :
                            'rgba(255, 255, 255, 0.15)';
                        this.ctx.lineWidth = isActive ? 2 : 1;
                        this.ctx.stroke();

                        // Add glow effect for active connections
                        if (isActive) {
                            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                            this.ctx.lineWidth = 4;
                            this.ctx.stroke();
                        }
                    });

                    // Draw nodes
                    this.nodes.forEach(node => {
                        const isActive = this.activeNode === node;

                        // Glow effect
                        const gradient = this.ctx.createRadialGradient(
                            node.x, node.y, 0,
                            node.x, node.y, node.radius * 3
                        );
                        gradient.addColorStop(0, isActive ?
                            'rgba(255, 255, 255, 0.4)' :
                            'rgba(255, 255, 255, 0.2)'
                        );
                        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                        this.ctx.fillStyle = gradient;
                        this.ctx.fillRect(
                            node.x - node.radius * 3,
                            node.y - node.radius * 3,
                            node.radius * 6,
                            node.radius * 6
                        );

                        // Node circle
                        this.ctx.beginPath();
                        this.ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                        this.ctx.fillStyle = '#fff';
                        this.ctx.fill();

                        // Add ring for active node
                        if (isActive) {
                            this.ctx.beginPath();
                            this.ctx.arc(node.x, node.y, node.radius + 4, 0, Math.PI * 2);
                            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                            this.ctx.lineWidth = 1;
                            this.ctx.stroke();
                        }
                    });

                    this.animationFrame = requestAnimationFrame(animate);
                };

                animate();
            }

            clearGraph() {
                this.nodes = [];
                this.connections = [];
                this.activeNode = null;
                this.canvas.classList.remove('visible');
                this.searchContainer.classList.remove('active');
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // Initialize
        new MinimalDecisionUI();
    </script>
</body>

</html>
